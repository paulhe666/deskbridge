name: Build Linux Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Deskbridge release version, for example 1.6.5'
        required: true
        default: '1.6.5'

jobs:
  linux-packages:
    name: Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            unzip \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            libfuse2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download release source package
        run: |
          VERSION='${{ github.event.inputs.version }}'
          curl -L -o deskbridge-source.zip \
            "https://github.com/paulhe666/deskbridge/releases/download/v${VERSION}/deskbridge-${VERSION}-source.zip"
          unzip deskbridge-source.zip -d source
          ls -la source

      - name: Install web dependencies
        working-directory: source/web
        run: npm ci

      - name: Build web frontend
        working-directory: source/web
        run: npm run build

      - name: Test Rust code
        working-directory: source
        run: cargo test

      - name: Build Linux bundles
        working-directory: source
        run: npx --prefix web tauri build --bundles deb,appimage

      - name: Collect Linux artifacts
        working-directory: source
        run: |
          mkdir -p ../dist/linux
          find target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' \) -print -exec cp {} ../dist/linux/ \;
          ls -lh ../dist/linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Deskbridge-Linux-Packages-${{ github.event.inputs.version }}
          path: dist/linux/*
          if-no-files-found: error
